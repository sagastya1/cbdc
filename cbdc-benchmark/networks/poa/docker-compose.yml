version: '3.8'

networks:
  poa-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  besu-poa-bootnode:
    image: hyperledger/besu:24.1.2
    container_name: besu-poa-bootnode
    hostname: bootnode
    networks:
      poa-net:
        ipv4_address: 172.20.0.10
    ports:
      - "8545:8545"       # HTTP RPC
      - "8546:8546"       # WebSocket RPC
      - "30303:30303"     # P2P
    volumes:
      - ./data/bootnode:/data
      - ./genesis.json:/genesis.json:ro
      - ./keys/bootnode:/keys:ro
    command: >
      --data-path=/data
      --genesis-file=/genesis.json
      --node-private-key-file=/keys/key
      --rpc-http-enabled=true
      --rpc-http-api=ETH,NET,WEB3,CLIQUE,ADMIN,TXPOOL
      --rpc-http-host=0.0.0.0
      --rpc-http-port=8545
      --rpc-http-cors-origins=*
      --rpc-ws-enabled=true
      --rpc-ws-host=0.0.0.0
      --rpc-ws-port=8546
      --host-allowlist=*
      --p2p-port=30303
      --network-id=1337
      --min-gas-price=0
      --tx-pool-max-size=8192
      --logging=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "-X", "POST",
             "-H", "Content-Type: application/json",
             "-d", "{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}",
             "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 20

  besu-poa-validator1:
    image: hyperledger/besu:24.1.2
    container_name: besu-poa-validator1
    hostname: validator1
    networks:
      poa-net:
        ipv4_address: 172.20.0.11
    volumes:
      - ./data/validator1:/data
      - ./genesis.json:/genesis.json:ro
      - ./keys/validator1:/keys:ro
    command: >
      --data-path=/data
      --genesis-file=/genesis.json
      --node-private-key-file=/keys/key
      --p2p-port=30303
      --network-id=1337
      --min-gas-price=0
      --bootnodes=enode://${BOOTNODE_PUBKEY}@172.20.0.10:30303
      --logging=INFO
    depends_on:
      besu-poa-bootnode:
        condition: service_healthy

  besu-poa-validator2:
    image: hyperledger/besu:24.1.2
    container_name: besu-poa-validator2
    hostname: validator2
    networks:
      poa-net:
        ipv4_address: 172.20.0.12
    volumes:
      - ./data/validator2:/data
      - ./genesis.json:/genesis.json:ro
      - ./keys/validator2:/keys:ro
    command: >
      --data-path=/data
      --genesis-file=/genesis.json
      --node-private-key-file=/keys/key
      --p2p-port=30303
      --network-id=1337
      --min-gas-price=0
      --bootnodes=enode://${BOOTNODE_PUBKEY}@172.20.0.10:30303
      --logging=INFO
    depends_on:
      besu-poa-bootnode:
        condition: service_healthy

  besu-poa-validator3:
    image: hyperledger/besu:24.1.2
    container_name: besu-poa-validator3
    hostname: validator3
    networks:
      poa-net:
        ipv4_address: 172.20.0.13
    volumes:
      - ./data/validator3:/data
      - ./genesis.json:/genesis.json:ro
      - ./keys/validator3:/keys:ro
    command: >
      --data-path=/data
      --genesis-file=/genesis.json
      --node-private-key-file=/keys/key
      --p2p-port=30303
      --network-id=1337
      --min-gas-price=0
      --bootnodes=enode://${BOOTNODE_PUBKEY}@172.20.0.10:30303
      --logging=INFO
    depends_on:
      besu-poa-bootnode:
        condition: service_healthy
